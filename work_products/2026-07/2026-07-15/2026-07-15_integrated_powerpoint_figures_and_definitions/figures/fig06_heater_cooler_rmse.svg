  <text x="540.0" y="612.0" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700" fill="#4b5563" text-anchor="middle">Interpretation: these are model-form clues for setup-only closures, not final admitted predictive results.</text>
