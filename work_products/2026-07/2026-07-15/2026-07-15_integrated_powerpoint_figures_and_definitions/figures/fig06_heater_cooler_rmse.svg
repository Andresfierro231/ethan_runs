  <text x="804.0" y="522.0" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="400" fill="#4b5563" text-anchor="start">Q_heater = eta P_electrical;</text>
  <text x="804.0" y="537.0" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="400" fill="#4b5563" text-anchor="start">one scalar fit on Salt2,</text>
  <text x="804.0" y="552.0" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="400" fill="#4b5563" text-anchor="start">scored on Salt3/4 without</text>
