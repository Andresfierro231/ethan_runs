<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="680" viewBox="0 0 1180 680">
<rect x="0" y="0" width="1180" height="680" fill="#FFFFFF"/>
<style>
text{font-family:Arial,Helvetica,sans-serif;fill:#111827}
.title{font-size:22px;font-weight:700}
.subtitle{font-size:12px;fill:#4B5563}
.tick{font-size:11px;fill:#4B5563}
.small{font-size:10px;fill:#4B5563}
.label{font-size:12px;fill:#111827}
.legend{font-size:11px;fill:#111827}
.axis{stroke:#374151;stroke-width:1}
.grid{stroke:#E5E7EB;stroke-width:1}
</style>
<text x="86" y="34" class="title">Prescribing CFD cooler duty collapses the fixed-mdot temperature error</text>
<text x="86" y="56" class="subtitle">Salt 2/3/4 mean errors at CFD mdot; pressure residual is diagnostic, not a gate</text>
<line x1="86" y1="535.0" x2="1144" y2="535.0" class="grid"/>
<text x="76" y="539.0" text-anchor="end" class="tick">0</text>
<line x1="86" y1="423.2" x2="1144" y2="423.2" class="grid"/>
<text x="76" y="427.2" text-anchor="end" class="tick">20</text>
<line x1="86" y1="311.5" x2="1144" y2="311.5" class="grid"/>
<text x="76" y="315.5" text-anchor="end" class="tick">40</text>
<line x1="86" y1="199.8" x2="1144" y2="199.8" class="grid"/>
<text x="76" y="203.8" text-anchor="end" class="tick">60</text>
<line x1="86" y1="88.0" x2="1144" y2="88.0" class="grid"/>
<text x="76" y="92.0" text-anchor="end" class="tick">80</text>
<line x1="86" y1="535.0" x2="1144" y2="535.0" class="axis"/>
<text x="24" y="311.5" class="label" transform="rotate(-90 24 311.5)">Mean absolute error (K)</text>
<rect x="214.3" y="178.8" width="39.4" height="356.2" fill="#DC2626"/>
<text x="234.0" y="173.8" text-anchor="middle" class="small">63.7</text>
<rect x="262.3" y="529.0" width="39.4" height="6.0" fill="#0F766E"/>
<text x="282.0" y="524.0" text-anchor="middle" class="small">1.08</text>
<text x="262.3" y="563" text-anchor="middle" class="tick">Baseline</text>
<text x="262.3" y="576" text-anchor="middle" class="tick">current 1D</text>
<rect x="567.0" y="510.1" width="39.4" height="24.9" fill="#DC2626"/>
<text x="586.7" y="505.1" text-anchor="middle" class="small">4.46</text>
<rect x="615.0" y="534.2" width="39.4" height="0.8" fill="#0F766E"/>
<text x="634.7" y="529.2" text-anchor="middle" class="small">0.14</text>
<text x="615.0" y="563" text-anchor="middle" class="tick">CFD cooler</text>
<text x="615.0" y="576" text-anchor="middle" class="tick">duty only</text>
<rect x="919.7" y="312.9" width="39.4" height="222.1" fill="#DC2626"/>
<text x="939.3" y="307.9" text-anchor="middle" class="small">39.7</text>
<rect x="967.7" y="531.8" width="39.4" height="3.2" fill="#0F766E"/>
<text x="987.3" y="526.8" text-anchor="middle" class="small">0.58</text>
<text x="967.7" y="563" text-anchor="middle" class="tick">CFD cooler +</text>
<text x="967.7" y="576" text-anchor="middle" class="tick">heater flux</text>
<rect x="86" y="598" width="12" height="12" fill="#DC2626"/>
<text x="104" y="608" class="legend">mean |Tmean error|</text>
<rect x="296" y="598" width="12" height="12" fill="#0F766E"/>
<text x="314" y="608" class="legend">mean |loop dT error|</text>
<text x="86" y="642" class="small">Baseline is the current 1D thermal contract at CFD mdot. CFD cooler duty alone is the best three-case mean replay; adding CFD heater wall</text>
<text x="86" y="656" class="small">flux over-cools the loop.</text>
